<script type="text/babel">


// Android.jsx — Simplified Android (Material 3) device frame
// Status bar + top app bar + content + gesture nav + keyboard.
// Based on Figma M3 spec. No dependencies, no image assets.

const MD_C = {
  surface: '#f4fbf8',
  surfaceVariant: '#dae5e1',
  inverseOnSurface: '#ecf2ef',
  secondaryContainer: '#cde8e1',
  primaryFixedDim: '#83d5c6',
  onSurface: '#171d1b',
  onSurfaceVar: '#49454f',
  onPrimaryContainer: '#00201c',
  primary: '#006a60',
  frameBorder: 'rgba(116,119,117,0.5)'
};

// ─────────────────────────────────────────────────────────────
// Status bar (time left, wifi/cell/battery right)
// ─────────────────────────────────────────────────────────────
function AndroidStatusBar({ dark = false }) {
  const c = dark ? '#fff' : MD_C.onSurface;
  return (
    <div style={{
      height: 40, display: 'flex', alignItems: 'center',
      justifyContent: 'space-between', padding: '0 16px',
      position: 'relative',
      fontFamily: 'Roboto, system-ui, sans-serif'
    }}>
      {/* time left */}
      <div style={{ width: 128, display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 14, fontWeight: 400, letterSpacing: 0.25, lineHeight: '20px', color: c }}>9:30</span>
      </div>
      {/* camera punch-hole (center) */}
      <div style={{
        position: 'absolute', left: '50%', top: 8, transform: 'translateX(-50%)',
        width: 24, height: 24, borderRadius: 100, background: '#2e2e2e'
      }} />
      {/* status icons right */}
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <div style={{ display: 'flex', paddingRight: 2 }}>
          <svg width="16" height="16" viewBox="0 0 16 16" style={{ marginRight: -2 }}>
            <path d="M8 13.3L.67 5.97a10.37 10.37 0 0114.66 0L8 13.3z" fill={c} />
          </svg>
          <svg width="16" height="16" viewBox="0 0 16 16" style={{ marginRight: -2 }}>
            <path d="M14.67 14.67V1.33L1.33 14.67h13.34z" fill={c} />
          </svg>
        </div>
        <svg width="16" height="16" viewBox="0 0 16 16">
          <rect x="3.75" y="2" width="8.5" height="13" rx="1.5" fill={c} />
          <rect x="5.5" y="0.9" width="5" height="2" rx="0.5" fill={c} />
        </svg>
      </div>
    </div>);

}

// ─────────────────────────────────────────────────────────────
// Top app bar (Material 3 small/medium)
// ─────────────────────────────────────────────────────────────
function AndroidAppBar({ title = 'Title', large = false }) {
  const iconDot =
  <div style={{
    width: 48, height: 48, display: 'flex', alignItems: 'center', justifyContent: 'center'
  }}>
      <div style={{ width: 22, height: 22, borderRadius: '50%', background: MD_C.onSurfaceVar, opacity: 0.3 }} />
    </div>;

  return (
    <div style={{ background: MD_C.surface, padding: '4px 4px 0' }}>
      <div style={{ height: 56, display: 'flex', alignItems: 'center', gap: 4 }}>
        {iconDot}
        {!large &&
        <span style={{
          flex: 1, fontSize: 22, fontWeight: 400, color: MD_C.onSurface,
          fontFamily: 'Roboto, system-ui, sans-serif'
        }}>{title}</span>
        }
        {large && <div style={{ flex: 1 }} />}
        {iconDot}
      </div>
      {large &&
      <div style={{
        padding: '16px 16px 20px',
        fontSize: 28, fontWeight: 400, color: MD_C.onSurface,
        fontFamily: 'Roboto, system-ui, sans-serif'
      }}>{title}</div>
      }
    </div>);

}

// ─────────────────────────────────────────────────────────────
// List item (Material 3)
// ─────────────────────────────────────────────────────────────
function AndroidListItem({ headline, supporting, leading }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 16,
      padding: '12px 16px', minHeight: 56, boxSizing: 'border-box',
      fontFamily: 'Roboto, system-ui, sans-serif'
    }}>
      {leading &&
      <div style={{
        width: 40, height: 40, borderRadius: '50%',
        background: MD_C.primary, color: '#fff',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 18, fontWeight: 500, flexShrink: 0
      }}>{leading}</div>
      }
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 16, color: MD_C.onSurface, lineHeight: '24px' }}>{headline}</div>
        {supporting &&
        <div style={{ fontSize: 14, color: MD_C.onSurfaceVar, lineHeight: '20px' }}>{supporting}</div>
        }
      </div>
    </div>);

}

// ─────────────────────────────────────────────────────────────
// Gesture nav bar (pill)
// ─────────────────────────────────────────────────────────────
function AndroidNavBar({ dark = false }) {
  return (
    <div style={{
      height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
      <div style={{
        width: 108, height: 4, borderRadius: 2,
        background: dark ? '#fff' : MD_C.onSurface, opacity: 0.4
      }} />
    </div>);

}

// ─────────────────────────────────────────────────────────────
// Device frame — wraps everything
// ─────────────────────────────────────────────────────────────
function AndroidDevice({
  children, width = 412, height = 892, dark = false,
  title, large = false, keyboard = false
}) {
  return (
    <div style={{
      width, height, borderRadius: 18, overflow: 'hidden',
      background: dark ? '#1d1b20' : MD_C.surface,
      border: `8px solid ${MD_C.frameBorder}`,
      boxShadow: '0 30px 80px rgba(0,0,0,0.25)',
      display: 'flex', flexDirection: 'column', boxSizing: 'border-box'
    }}>
      <AndroidStatusBar dark={dark} />
      {title !== undefined && <AndroidAppBar title={title} large={large} />}
      <div style={{ flex: 1, overflow: 'auto' }}>
        {children}
      </div>
      {keyboard && <AndroidKeyboard />}
      <AndroidNavBar dark={dark} />
    </div>);

}

// ─────────────────────────────────────────────────────────────
// Keyboard — Gboard (Material 3)
// ─────────────────────────────────────────────────────────────
function AndroidKeyboard() {
  let _k = 0;
  const key = (l, { flex = 1, bg = MD_C.surface, r = 6, minW, fs = 21 } = {}) =>
  <div key={_k++} style={{
    height: 46, borderRadius: r, flex, minWidth: minW,
    background: bg, display: 'flex', alignItems: 'center', justifyContent: 'center',
    fontFamily: 'Roboto, system-ui', fontSize: fs,
    color: MD_C.onPrimaryContainer
  }}>{l}</div>;

  const row = (keys, style = {}) =>
  <div style={{ display: 'flex', gap: 6, justifyContent: 'center', ...style }}>
      {keys.map((l) => key(l))}
    </div>;

  return (
    <div style={{
      background: MD_C.inverseOnSurface, padding: '0 8px 8px',
      display: 'flex', flexDirection: 'column', gap: 4
    }}>
      {/* navbar spacer (icons omitted) */}
      <div style={{ height: 44 }} />
      {/* key rows */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {row(['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'])}
        {row(['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'], { padding: '0 20px' })}
        <div style={{ display: 'flex', gap: 6 }}>
          {key('', { bg: MD_C.surfaceVariant })}
          <div style={{ display: 'flex', gap: 6, flex: 7, minWidth: 274 }}>
            {['z', 'x', 'c', 'v', 'b', 'n', 'm'].map((l) => key(l))}
          </div>
          {key('', { bg: MD_C.surfaceVariant })}
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          {key('?123', { bg: MD_C.secondaryContainer, r: 100, minW: 58, fs: 14 })}
          {key(',', { bg: MD_C.surfaceVariant })}
          {key('', { flex: 3, minW: 154 })}
          {key('.', { bg: MD_C.surfaceVariant })}
          {key('', { bg: MD_C.primaryFixedDim, r: 100, minW: 58 })}
        </div>
      </div>
    </div>);

}



// AuraJPS Driver App — Theme & Shared Components

const T = {
  navyDark: '#0A1628',
  navyMid: '#0F2044',
  navyCard: '#152855',
  navyBorder: '#1E3A6B',
  blue: '#1A6ED4',
  cyan: '#00AAFF',
  cyanLight: '#40C4FF',
  white: '#FFFFFF',
  muted: '#7A9CC5',
  mutedDark: '#3D5A84',
  success: '#22C55E',
  successBg: '#052E16',
  warning: '#F59E0B',
  warningBg: '#2D1B00',
  danger: '#EF4444',
  dangerBg: '#2D0A0A',
  pending: '#8B5CF6',
  pendingBg: '#1A0A3D'
};

const F = {
  family: "'Barlow', 'Roboto', system-ui, sans-serif",
  mono: "'Roboto Mono', monospace"
};

// ── Icon helper (Material Symbols Rounded) ───────────────────
function Icon({ n, size = 20, color = 'currentColor', style = {} }) {
  return <span className="ms" style={{ fontSize: size, color, lineHeight: 1, flexShrink: 0, ...style }}>{n}</span>;
}

// ── Shared small components ─────────────────────────────────

function AppHeader({ title, subtitle, onBack, rightEl, dark = true }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '12px 16px 10px',
      background: dark ? T.navyMid : T.navyDark,
      borderBottom: `1px solid ${T.navyBorder}`,
      minHeight: 56
    }}>
      {onBack &&
      <button onClick={onBack} style={{
        width: 36, height: 36, borderRadius: 8,
        background: T.navyCard, border: 'none',
        color: T.white, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0
      }}><Icon n="chevron_left" size={22} color={T.white} /></button>
      }
      <div style={{ flex: 1 }}>
        <div style={{ fontFamily: F.family, fontWeight: 700, fontSize: 18, color: T.white, lineHeight: 1.2 }}>{title}</div>
        {subtitle && <div style={{ fontFamily: F.family, fontSize: 12, color: T.muted, marginTop: 2 }}>{subtitle}</div>}
      </div>
      {rightEl}
    </div>);

}

function StatusBadge({ status }) {
  const map = {
    pending: { label: 'Pending', bg: T.pendingBg, color: T.pending, dot: T.pending },
    pickup: { label: 'Pickup', bg: T.warningBg, color: T.warning, dot: T.warning },
    transit: { label: 'In Transit', bg: '#0A1A3D', color: T.cyan, dot: T.cyan },
    delivered: { label: 'Delivered', bg: T.successBg, color: T.success, dot: T.success },
    failed: { label: 'Failed', bg: T.dangerBg, color: T.danger, dot: T.danger }
  };
  const s = map[status] || map.pending;
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      background: s.bg, color: s.color,
      borderRadius: 20, padding: '3px 10px',
      fontSize: 11, fontWeight: 700, fontFamily: F.family,
      textTransform: 'uppercase', letterSpacing: 0.5,
      border: '1px solid rgb(0, 53, 137)'
    }}>
      <div style={{ width: 6, height: 6, borderRadius: '50%', background: s.dot, flexShrink: 0 }} />
      {s.label}
    </div>);

}

function Card({ children, style = {}, onClick }) {
  return (
    <div onClick={onClick} style={{
      background: T.navyCard,
      border: `1px solid ${T.navyBorder}`,
      borderRadius: 12,
      padding: '14px 16px',
      cursor: onClick ? 'pointer' : 'default',
      ...style
    }}>
      {children}
    </div>);

}

function BigButton({ label, sublabel, color = T.cyan, bg, icon, onClick, style = {} }) {
  return (
    <button onClick={onClick} style={{
      width: '100%', padding: '16px',
      background: bg || `${color}22`,
      border: `1.5px solid ${color}55`,
      borderRadius: 14, cursor: 'pointer',
      display: 'flex', alignItems: 'center', gap: 14,
      textAlign: 'left', ...style
    }}>
      {icon && <div style={{
        width: 46, height: 46, borderRadius: 12,
        background: `${color}33`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        flexShrink: 0
      }}>{icon}</div>}
      <div>
        <div style={{ fontFamily: F.family, fontSize: 16, fontWeight: 700, color: T.white }}>{label}</div>
        {sublabel && <div style={{ fontFamily: F.family, fontSize: 12, color: T.muted, marginTop: 2 }}>{sublabel}</div>}
      </div>
    </button>);

}

function BottomNav({ active, onNav }) {
  const items = [
  { id: 'dashboard', icon: 'home', label: 'Home' },
  { id: 'deliveries', icon: 'package_2', label: 'Delivery' },
  { id: 'scanner', icon: 'qr_code_scanner', label: 'Scan' },
  { id: 'expense', icon: 'account_balance_wallet', label: 'Expense' },
  { id: 'profile', icon: 'person', label: 'Profil' }];

  return (
    <div style={{
      display: 'flex', background: T.navyMid,
      borderTop: `1px solid ${T.navyBorder}`,
      padding: '6px 0 2px'
    }}>
      {items.map((it) =>
      <button key={it.id} onClick={() => onNav(it.id)} style={{
        flex: 1, border: 'none', background: 'none',
        cursor: 'pointer', padding: '6px 0',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2
      }}>
          <Icon n={it.icon} size={22} color={active === it.id ? T.cyan : T.mutedDark} />
          <div style={{
          fontFamily: F.family, fontSize: 10, fontWeight: 600,
          color: active === it.id ? T.cyan : T.mutedDark,
          textTransform: 'uppercase', letterSpacing: 0.5
        }}>{it.label}</div>
          {active === it.id &&
        <div style={{ width: 20, height: 2, borderRadius: 1, background: T.cyan }} />
        }
        </button>
      )}
    </div>);

}

function SyncIndicator({ synced }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 5,
      background: synced ? T.successBg : T.warningBg,
      border: `1px solid ${synced ? T.success : T.warning}44`,
      borderRadius: 20, padding: '4px 10px', color: "rgb(0, 0, 0)"
    }}>
      <Icon n={synced ? 'cloud_done' : 'wifi_off'} size={14} color={synced ? T.success : T.warning} />
      <span style={{ fontFamily: F.family, fontSize: 11, fontWeight: 600, color: synced ? T.success : T.warning }}>
        {synced ? 'Synced' : 'Offline'}
      </span>
    </div>);

}

function Divider() {
  return <div style={{ height: 1, background: T.navyBorder, margin: '4px 0' }} />;
}

{ id: 'AJP001239', customer: 'Priya Rajan', address: 'No 88, Jln Semarak, Ampang', phone: '0165432198', weight: '4.0 kg', status: 'failed', time: '14:00' }];


// ── 1. LOGIN ─────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [user, setUser] = React.useState('');
  const [pass, setPass] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  function handleLogin() {
    setLoading(true);
    setTimeout(() => {setLoading(false);onLogin();}, 1200);
  }

  const fields = [
  { label: 'ID Pemandu / Driver ID', val: user, set: setUser, placeholder: 'e.g. DRV-2024-001', icon: 'person', type: 'text' },
  { label: 'Kata Laluan / Password', val: pass, set: setPass, placeholder: '••••••••', icon: 'lock', type: 'password' }];


  return (
    <div style={{ minHeight: '100%', background: T.navyDark, display: 'flex', flexDirection: 'column' }}>
      <div style={{ background: `linear-gradient(160deg, ${T.blue}33 0%, ${T.navyMid} 60%)`, borderBottom: `1px solid ${T.navyBorder}`, padding: '40px 24px 32px', textAlign: 'center' }}>
        <div style={{ marginBottom: 16 }}>
          <div style={{ width: 80, height: 80, borderRadius: 20, background: `${T.blue}22`, border: `2px solid ${T.cyan}44`, margin: '0 auto 14px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon n="language" size={44} color={T.cyan} />
          </div>
          <div style={{ fontFamily: F.family, fontSize: 28, fontWeight: 900, color: T.white, letterSpacing: 1 }}>AURA<span style={{ color: T.cyan }}>JPS</span></div>
          <div style={{ fontFamily: F.family, fontSize: 13, fontWeight: 600, color: T.muted, letterSpacing: 2, textTransform: 'uppercase', marginTop: 2 }}>Cargo Sdn Bhd</div>
          <div style={{ fontFamily: F.family, fontSize: 11, color: T.mutedDark, marginTop: 6, fontStyle: 'italic' }}>Cepat. Tepat. Dan Aman.</div>
        </div>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: `${T.cyan}22`, border: `1px solid ${T.cyan}44`, borderRadius: 20, padding: '5px 14px' }}>
          <Icon n="local_shipping" size={14} color={T.cyan} />
          <span style={{ fontFamily: F.family, fontSize: 12, color: T.cyan, fontWeight: 600 }}>Driver Mobile App</span>
        </div>
      </div>

      <div style={{ flex: 1, padding: '28px 24px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div style={{ fontFamily: F.family, fontSize: 22, fontWeight: 800, color: T.white, marginBottom: 4 }}>
          Log Masuk<br /><span style={{ fontSize: 14, fontWeight: 400, color: T.muted }}>Sign in to your driver account</span>
        </div>

        {fields.map((f, i) =>
        <div key={i}>
            <div style={{ fontFamily: F.family, fontSize: 12, fontWeight: 600, color: T.muted, marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>{f.label}</div>
            <div style={{ position: 'relative' }}>
              <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', display: 'flex' }}>
                <Icon n={f.icon} size={18} color={T.muted} />
              </span>
              <input value={f.val} onChange={(e) => f.set(e.target.value)} type={f.type} placeholder={f.placeholder}
            style={{ width: '100%', boxSizing: 'border-box', background: T.navyCard, border: `1.5px solid ${T.navyBorder}`, borderRadius: 12, padding: '14px 14px 14px 42px', fontFamily: F.family, fontSize: 15, color: T.white, outline: 'none' }} />
            </div>
          </div>
        )}

        <button onClick={handleLogin} disabled={loading} style={{ width: '100%', padding: '16px', marginTop: 8, background: loading ? T.mutedDark : `linear-gradient(135deg, ${T.blue}, ${T.cyan})`, border: 'none', borderRadius: 14, cursor: 'pointer', fontFamily: F.family, fontSize: 16, fontWeight: 800, color: T.white, letterSpacing: 0.5, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
          {loading ? <><Icon n="sync" size={18} color={T.white} /> Logging in...</> : <><Icon n="login" size={18} color={T.white} /> Log Masuk / Login</>}
        </button>

        <div style={{ textAlign: 'center', fontFamily: F.family, fontSize: 12, color: T.muted }}>
          Lupa kata laluan? <span style={{ color: T.cyan }}>Hubungi Dispatcher</span>
        </div>

        <div style={{ marginTop: 'auto', padding: '16px', background: T.navyCard, borderRadius: 12, border: `1px solid ${T.navyBorder}` }}>
          <div style={{ fontFamily: F.family, fontSize: 11, color: T.muted, textAlign: 'center', marginBottom: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 0.5 }}>Security</div>
          <div style={{ display: 'flex', gap: 8 }}>
            {[['smartphone', 'Device Binding'], ['lock', 'Secure Login'], ['timer', 'Auto Logout']].map(([ic, label], i) =>
            <div key={i} style={{ flex: 1, textAlign: 'center', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>

          </div>

      </div>

}

// ── 2. DASHBOARD ─────────────────────────────────────────────
function DashboardScreen({ onNav, onParcel }) {
  const [synced, setSynced] = React.useState(true);
  const hour = new Date().getHours();

// ── 5. PROOF OF DELIVERY ─────────────────────────────────────
function PODScreen({ parcel, onBack, onDone }) {
  const d = parcel || DELIVERIES[1];
  const [photoTaken, setPhotoTaken] = React.useState(false);
  const [signed, setSigned] = React.useState(false);
  const [receiver, setReceiver] = React.useState('');
  const canvasRef = React.useRef(null);
  const drawing = React.useRef(false);
  const lastPos = React.useRef(null);

  function getPos(e) {
    const rect = canvasRef.current.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }
  function startDraw(e) {drawing.current = true;lastPos.current = getPos(e);}
  function doDraw(e) {
    if (!drawing.current) return;
    e.preventDefault();
    const pos = getPos(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.strokeStyle = T.cyan;ctx.lineWidth = 2;ctx.lineCap = 'round';
    ctx.beginPath();ctx.moveTo(lastPos.current.x, lastPos.current.y);ctx.lineTo(pos.x, pos.y);ctx.stroke();
    lastPos.current = pos;
    setSigned(true);
  }
  function endDraw() {drawing.current = false;}
  function clearSig() {
    canvasRef.current.getContext('2d').clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
    setSigned(false);
  }

  const canSubmit = photoTaken && signed && receiver.length > 2;

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.navyDark }}>
      <AppHeader title="Bukti Penghantaran" subtitle="Proof of Delivery — POD" onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', padding: '14px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: F.family, fontSize: 13, color: T.muted, background: T.navyCard, border: `1px solid ${T.navyBorder}`, borderRadius: 10, padding: '10px 14px' }}>
          <Icon n="package_2" size={16} color={T.cyan} /><b style={{ color: T.white }}>{d.id}</b> · {d.customer}
        </div>

        {/* Step 1: Photo */}
        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: F.family, fontSize: 13, fontWeight: 700, color: T.white }}>
              <Icon n="photo_camera" size={18} color={photoTaken ? T.success : T.cyan} /> 1. Gambar Bukti / Photo
            </div>
            {photoTaken && <span style={{ fontSize: 12, color: T.success, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 4 }}><Icon n="check_circle" size={14} color={T.success} />Done</span>}
          </div>
          {!photoTaken ?
          <button onClick={() => setPhotoTaken(true)} style={{ width: '100%', height: 100, background: T.navyDark, border: `2px dashed ${T.navyBorder}`, borderRadius: 10, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
              <Icon n="add_a_photo" size={30} color={T.muted} />
              <span style={{ fontFamily: F.family, fontSize: 12, color: T.muted }}>Ketik untuk ambil gambar</span>
            </button> :

          <div style={{ height: 100, background: `linear-gradient(135deg, #1a3a1a, #0a2a0a)`, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', border: `1.5px solid ${T.success}44`, flexDirection: 'column', gap: 6 }}>
              <Icon n="image" size={30} color={T.success} />
              <span style={{ fontFamily: F.family, fontSize: 11, color: T.success, fontWeight: 600 }}>Gambar diambil — Photo captured</span>
              <button onClick={() => setPhotoTaken(false)} style={{ background: 'none', border: 'none', color: T.muted, fontSize: 11, cursor: 'pointer' }}>Ambil semula / Retake</button>
            </div>
          }
        </Card>

        {/* Step 2: Receiver */}
        <Card>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: F.family, fontSize: 13, fontWeight: 700, color: T.white, marginBottom: 10 }}>
            <Icon n="person" size={18} color={T.cyan} /> 2. Maklumat Penerima
          </div>
          <input value={receiver} onChange={(e) => setReceiver(e.target.value)} placeholder="Nama penerima / Receiver name"
          style={{ width: '100%', boxSizing: 'border-box', background: T.navyDark, border: `1.5px solid ${T.navyBorder}`, borderRadius: 10, padding: '12px 14px', fontFamily: F.family, fontSize: 14, color: T.white, outline: 'none' }} />
        </Card>

        {/* Step 3: Signature */}
        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontFamily: F.family, fontSize: 13, fontWeight: 700, color: T.white }}>
              <Icon n="draw" size={18} color={T.cyan} /> 3. Tandatangan / Signature
            </div>
            {signed && <button onClick={clearSig} style={{ background: 'none', border: 'none', color: T.muted, fontSize: 11, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }}><Icon n="refresh" size={12} color={T.muted} />Clear</button>}
          </div>
          <div style={{ background: T.navyDark, borderRadius: 10, border: `1.5px dashed ${signed ? T.cyan : T.navyBorder}`, position: 'relative', overflow: 'hidden' }}>
            <canvas ref={canvasRef} width={340} height={120} style={{ display: 'block', width: '100%', height: 120, touchAction: 'none' }}
            onMouseDown={startDraw} onMouseMove={doDraw} onMouseUp={endDraw}
            onTouchStart={startDraw} onTouchMove={doDraw} onTouchEnd={endDraw} />
            {!signed &&
            <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', display: 'flex', alignItems: 'center', gap: 6, pointerEvents: 'none' }}>
                <Icon n="draw" size={16} color={T.mutedDark} />
                <span style={{ fontFamily: F.family, fontSize: 12, color: T.mutedDark }}>Sign here / Tandatangan di sini</span>
              </div>
            }
          </div>
        </Card>

        <button onClick={canSubmit ? onDone : null} style={{ width: '100%', padding: '16px', background: canSubmit ? `linear-gradient(135deg, ${T.blue}, ${T.cyan})` : T.navyCard, border: `1.5px solid ${canSubmit ? T.cyan : T.navyBorder}`, borderRadius: 14, cursor: canSubmit ? 'pointer' : 'not-allowed', fontFamily: F.family, fontSize: 16, fontWeight: 800, color: canSubmit ? T.navyDark : T.mutedDark, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
          {canSubmit ?
          <><Icon n="check_circle" size={20} color={T.navyDark} /> Hantar POD / Submit Proof</> :
          <><Icon n="info" size={20} color={T.mutedDark} /> Lengkapkan semua langkah</>}
        </button>
        <div style={{ height: 8 }} />
      </div>
    </div>);

}

// ── 8. EXPENSE TRACKING ──────────────────────────────────────
function ExpenseScreen({ onBack }) {
  const [expenses, setExpenses] = React.useState([
  { type: 'fuel', label: 'Minyak / Fuel', amount: 50, note: 'Shell Puchong', icon: 'local_gas_station', color: T.warning, time: '08:30' },
  { type: 'toll', label: 'Tol / Toll', amount: 4.20, note: 'NPE Tol', icon: 'route', color: T.cyan, time: '09:00' }]
  );
  const [adding, setAdding] = React.useState(false);
  const [form, setForm] = React.useState({ type: 'fuel', amount: '', note: '' });

  const total = expenses.reduce((s, e) => s + e.amount, 0);
  const types = [
  { id: 'fuel', label: 'Minyak', icon: 'local_gas_station', color: T.warning },
  { id: 'toll', label: 'Tol', icon: 'route', color: T.cyan },
  { id: 'parking', label: 'Parking', icon: 'local_parking', color: T.pending },
  { id: 'other', label: 'Lain', icon: 'credit_card', color: T.muted }];


  function addExpense() {
    if (!form.amount) return;
    const t = types.find((x) => x.id === form.type);
    setExpenses((e) => [...e, { ...form, amount: parseFloat(form.amount), label: t.label, icon: t.icon, color: t.color, time: '—' }]);
    setAdding(false);
    setForm({ type: 'fuel', amount: '', note: '' });
  }

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.navyDark }}>
      <AppHeader title="Rekod Perbelanjaan" subtitle="Expense Tracking" onBack={onBack}
      rightEl={<button onClick={() => setAdding(true)} style={{ background: `${T.cyan}22`, border: `1px solid ${T.cyan}44`, borderRadius: 8, padding: '6px 12px', cursor: 'pointer', fontFamily: F.family, fontSize: 12, color: T.cyan, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 4 }}><Icon n="add" size={14} color={T.cyan} />Tambah</button>} />

      <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <Card style={{ background: `linear-gradient(135deg, ${T.blue}22, ${T.navyMid})`, border: `1px solid ${T.cyan}33` }}>
          <div style={{ fontFamily: F.family, fontSize: 12, color: T.muted, marginBottom: 4 }}>Jumlah Hari Ini / Today's Total</div>
          <div style={{ fontFamily: F.family, fontSize: 34, fontWeight: 900, color: T.cyan }}>RM {total.toFixed(2)}</div>
          <div style={{ display: 'flex', gap: 10, marginTop: 10 }}>
            {types.map((t) => {
              const sum = expenses.filter((e) => e.type === t.id).reduce((s, e) => s + e.amount, 0);
              return sum > 0 ?
              <div key={t.id} style={{ background: T.navyDark, borderRadius: 8, padding: '6px 10px', textAlign: 'center', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3 }}>
                  <Icon n={t.icon} size={16} color={t.color} />
                  <div style={{ fontFamily: F.family, fontSize: 11, fontWeight: 700, color: t.color }}>RM{sum.toFixed(2)}</div>
                </div> :
              null;
            })}
          </div>
        </Card>

        {adding &&
        <Card style={{ border: `1.5px solid ${T.cyan}44` }}>
            <div style={{ fontFamily: F.family, fontSize: 13, fontWeight: 700, color: T.white, marginBottom: 10 }}>Tambah Perbelanjaan</div>
            <div style={{ display: 'flex', gap: 6, marginBottom: 10 }}>
              {types.map((t) =>
            <button key={t.id} onClick={() => setForm((f) => ({ ...f, type: t.id }))} style={{ flex: 1, padding: '8px 4px', background: form.type === t.id ? `${t.color}22` : T.navyDark, border: `1.5px solid ${form.type === t.id ? t.color : T.navyBorder}`, borderRadius: 8, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                  <Icon n={t.icon} size={18} color={form.type === t.id ? t.color : T.muted} />
                  <span style={{ fontFamily: F.family, fontSize: 10, color: form.type === t.id ? t.color : T.muted, fontWeight: 700 }}>{t.label}</span>
                </button>
            )}
            </div>
            <input value={form.amount} onChange={(e) => setForm((f) => ({ ...f, amount: e.target.value }))} placeholder="Jumlah / Amount (RM)" type="number"
          style={{ width: '100%', boxSizing: 'border-box', background: T.navyDark, border: `1.5px solid ${T.navyBorder}`, borderRadius: 10, padding: '12px 14px', fontFamily: F.family, fontSize: 15, color: T.white, outline: 'none', marginBottom: 8 }} />
            <input value={form.note} onChange={(e) => setForm((f) => ({ ...f, note: e.target.value }))} placeholder="Nota / Note (optional)"
          style={{ width: '100%', boxSizing: 'border-box', background: T.navyDark, border: `1.5px solid ${T.navyBorder}`, borderRadius: 10, padding: '12px 14px', fontFamily: F.family, fontSize: 14, color: T.white, outline: 'none', marginBottom: 10 }} />
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={addExpense} style={{ flex: 2, padding: 12, background: `linear-gradient(135deg, ${T.blue}, ${T.cyan})`, border: 'none', borderRadius: 10, cursor: 'pointer', fontFamily: F.family, fontSize: 14, fontWeight: 800, color: T.navyDark, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>
                <Icon n="save" size={16} color={T.navyDark} /> Simpan
              </button>
              <button onClick={() => setAdding(false)} style={{ flex: 1, padding: 12, background: T.navyDark, border: `1px solid ${T.navyBorder}`, borderRadius: 10, cursor: 'pointer', fontFamily: F.family, fontSize: 14, color: T.muted }}>Batal</button>
            </div>
          </Card>
        }

        <div>
          <div style={{ fontFamily: F.family, fontSize: 11, fontWeight: 700, color: T.muted, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>Senarai Perbelanjaan</div>
          {expenses.map((e, i) =>
          <Card key={i} style={{ marginBottom: 8, padding: '12px 14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 42, height: 42, borderRadius: 10, background: `${e.color}22`, border: `1px solid ${e.color}44`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon n={e.icon} size={22} color={e.color} />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: F.family, fontSize: 14, fontWeight: 700, color: T.white }}>{e.label}</div>
                  <div style={{ fontFamily: F.family, fontSize: 11, color: T.muted }}>{e.note || '—'} · {e.time}</div>
                </div>
                <div style={{ fontFamily: F.family, fontSize: 16, fontWeight: 900, color: T.warning }}>RM {e.amount.toFixed(2)}</div>
              </div>
            </Card>
          )}
        </div>
      </div>
    </div>);

}

            </button>
            <button onClick={handleSubmit} disabled={submitting} style={{ flex: 2, padding: '14px', background: submitting ? T.mutedDark : `linear-gradient(135deg, ${T.blue}, ${T.cyan})`, border: 'none', borderRadius: 12, cursor: submitting ? 'wait' : 'pointer', fontFamily: F.family, fontSize: 15, fontWeight: 800, color: T.navyDark, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
              {submitting ? <><Icon n="sync" size={18} color={T.navyDark} /> Menghantar...</> : <><Icon n="send" size={18} color={T.navyDark} /> Hantar / Submit</>}
            </button>
          </div>
        </>}

        <div style={{ height: 10 }} />
      </div>
    </div>);

}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00D4AA",
  "showLeaderboard": true,
  "driverName": "Ahmad Faizal",
  "lightMode": true
}/*EDITMODE-END*/;

const darkTheme = {
  navyDark: '#0A1628', navyMid: '#0F2044', navyCard: '#152855', navyBorder: '#1E3A6B',
  blue: '#1A6ED4', cyan: '#00AAFF', cyanLight: '#40C4FF',
  white: '#FFFFFF', muted: '#7A9CC5', mutedDark: '#3D5A84',
  success: '#22C55E', successBg: '#052E16', warning: '#F59E0B', warningBg: '#2D1B00',
  danger: '#EF4444', dangerBg: '#2D0A0A', pending: '#8B5CF6', pendingBg: '#1A0A3D'
};
const lightTheme = {
  navyDark: '#EBF2FF', navyMid: '#FFFFFF', navyCard: '#FFFFFF', navyBorder: '#C0D2EE',
  blue: '#1255B5', cyan: '#0088CC', cyanLight: '#2BB5E8',
  white: '#0A1628', muted: '#3B608E', mutedDark: '#8AAAC8',
  success: '#15803D', successBg: '#DCFCE7', warning: '#B45309', warningBg: '#FEF3C7',
  danger: '#DC2626', dangerBg: '#FEE2E2', pending: '#6D28D9', pendingBg: '#EDE9FE'
};
// Initialize T from saved preference
const _savedTweaks = (() => {try {return JSON.parse(localStorage.getItem('aurajps_tweaks') || '{}');} catch {return {};}})();
const _initLight = _savedTweaks.lightMode || TWEAK_DEFAULTS.lightMode;
Object.assign(T, _initLight ? lightTheme : darkTheme);
document.body.style.background = _initLight ? '#D8E8FF' : '#05101E';

const { useState, useEffect } = React;

function App() {
  const [theme, setTheme] = useState('dark');
  const [activeScreen, setActiveScreen] = useState('login');
  const [activeParcel, setActiveParcel] = useState(null);

  function toggleTheme() {
    setTheme(current => (current === 'dark' ? 'light' : 'dark'));
  }

  function handleNav(screen) {
    setActiveScreen(screen);
  }

  function handleParcelSelect(parcel) {
    setActiveParcel(parcel);
    setActiveScreen('parcelDetail');
  }

  function handleBack() {
    if (activeScreen === 'parcelDetail') {
      setActiveScreen('deliveries');
    } else if (activeScreen === 'settings') {
      setActiveScreen('dashboard');
    } else {
      setActiveScreen('dashboard');
    }
  }
  
  const screens = {
    login: <LoginScreen onLogin={() => setActiveScreen('dashboard')} />,
    dashboard: <DashboardScreen onNav={handleNav} onParcel={handleParcelSelect} />,
    deliveries: <DeliveryListScreen onBack={handleBack} onParcel={handleParcelSelect} />,
    parcelDetail: <ParcelDetailScreen parcel={activeParcel} onBack={handleBack} onPOD={() => setActiveScreen('pod')} />,
    pod: <PODScreen parcel={activeParcel} onBack={() => setActiveScreen('parcelDetail')} />,
    scanner: <ScannerScreen onBack={handleBack} />,
    expense: <ExpenseScreen onBack={handleBack} />,
    profile: <ProfileScreen onBack={handleBack} onNav={handleNav} />,
    settings: <SettingsScreen onBack={handleBack} onToggleTheme={toggleTheme} theme={theme} />,
    gps: <GPSScreen onBack={handleBack} />,
    createorder: <CreateOrderScreen onBack={handleBack} onSubmit={() => setActiveScreen('dashboard')} />,
  };

  return (
    <AndroidDevice dark={theme === 'dark'}>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.navyDark }}>
        <div style={{ flex: 1, minHeight: 0 }}>
          {screens[activeScreen]}
        </div>
        {['dashboard', 'deliveries', 'scanner', 'expense', 'profile'].includes(activeScreen) && (
          <BottomNav active={activeScreen} onNav={handleNav} />
        )}
      </div>
    </AndroidDevice>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
